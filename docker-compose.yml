services:
  mongodb:
    image: mongo:8
    container_name: cn-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: cn-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-password
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:5173,http://localhost:5174
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5.26.0
    container_name: cn-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME}/${NEO4J_PASSWORD}"
    ports:
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u \"$${NEO4J_AUTH%%/*}\" -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cn-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
      COOKIE_SECRET: connected-neighbours-cookie-secret-docker
      MONGODB_URI: mongodb://mongodb:27017/connected-neighbours
      NEO4J_ENABLED: "${NEO4J_ENABLED:-true}"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: "${NEO4J_USERNAME}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      NEO4J_TIMEOUT_MS: "${NEO4J_TIMEOUT_MS:-2500}"
      NEO4J_RETRY_COOLDOWN_MS: "${NEO4J_RETRY_COOLDOWN_MS:-15000}"
      GRAPH_SYNC_WORKER_ENABLED: "${GRAPH_SYNC_WORKER_ENABLED:-true}"
      GRAPH_SYNC_INTERVAL_MS: "${GRAPH_SYNC_INTERVAL_MS:-15000}"
      GRAPH_SYNC_BATCH_SIZE: "${GRAPH_SYNC_BATCH_SIZE:-20}"
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_ENDPOINT: localhost
      MINIO_PUBLIC_PORT: 9000
      MINIO_PUBLIC_USE_SSL: "false"
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio-password
      MINIO_BUCKET: connected-neighbours
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: connected-neighbours
      KEYCLOAK_CLIENT_ID: connected-neighbours-api
      KEYCLOAK_CLIENT_SECRET: dev-secret
      JWT_SECRET: connected-neighbours-jwt-secret-docker
      JWT_EXPIRES_IN: 1d
      DEV_AUTH_SEED: "true"
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cn-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    container_name: cn-admin-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5174:80"

volumes:
  mongodb_data:
  minio_data:
  neo4j_data:
