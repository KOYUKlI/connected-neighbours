services:
  mongo:
    image: mongo:7
    container_name: connected_mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  neo4j:
    image: neo4j:5
    container_name: connected_neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
    volumes:
      - neo4j_data:/data

  # Optionnel : Keycloak (SSO/MFA)
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: connected_keycloak
    command: ["start-dev"]
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
    profiles: ["sso"]

volumes:
  mongo_data:
  neo4j_data: