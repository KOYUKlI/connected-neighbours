services:
  mongodb:
    ports: !reset []
    restart: always

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_API_CORS_ALLOW_ORIGIN: ${CORS_ORIGIN}
    ports: !override
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    restart: always

  neo4j:
    restart: always

  keycloak-db:
    restart: always

  mailpit:
    restart: always

  keycloak:
    command: ["start", "--import-realm"]
    environment:
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_PROXY: "edge"
    restart: always

  api:
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN}
      COOKIE_SECRET: ${COOKIE_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      DEV_AUTH_SEED: "false"
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_PUBLIC_PORT: ${MINIO_PUBLIC_PORT}
      MINIO_PUBLIC_USE_SSL: ${MINIO_PUBLIC_USE_SSL:-true}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL}
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G

  web:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  admin-web:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  caddy:
    image: caddy:2-alpine
    container_name: cn-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - admin-web
      - api
      - keycloak

volumes:
  caddy_data:
  caddy_config:
